version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
  disable:
    - depguard
  settings:
    errcheck:
      check-blank: false
  exclusions:
    rules:
      - linters: [errcheck]
        text: "rows.Close"
      - linters: [errcheck]
        text: "rows.Scan"
      - linters: [errcheck]
        path: "internal/report/reporter.go"
