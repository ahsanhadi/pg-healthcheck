name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Static analysis (go vet)
        run: go vet ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m

      - name: Build
        run: go build -v -ldflags="-s -w" ./cmd/pg_healthcheck/

      - name: Build (all platforms)
        run: |
          GOOS=linux   GOARCH=amd64  go build -o /dev/null ./cmd/pg_healthcheck/
          GOOS=linux   GOARCH=arm64  go build -o /dev/null ./cmd/pg_healthcheck/
          GOOS=darwin  GOARCH=amd64  go build -o /dev/null ./cmd/pg_healthcheck/
          GOOS=darwin  GOARCH=arm64  go build -o /dev/null ./cmd/pg_healthcheck/
          GOOS=windows GOARCH=amd64  go build -o /dev/null ./cmd/pg_healthcheck/

      - name: Test (unit)
        run: go test -race -count=1 ./...
